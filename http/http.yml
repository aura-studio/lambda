address: ":8080"
mode:
  debug: true
  cors: true
  wrapBody: false
  hideError: false
staticLink:
  - srcPath: "/static"
    dstPath: "./public"
prefixLink:
  - srcPrefix: "/api"
    dstPrefix: "/v1"
tokenLink:
  - srcPrefix: "/s"
    dstPath: "/api/shortlink/v1/resolve"
headerLinkKey:
  - key: "X-Custom-Header"
    prefix: "custom-"
pageNotFoundPath: ""
